name: Safe Obfuscated Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Obfuscator
        run: npm install javascript-obfuscator

      - name: Create and Protect Index
        run: |
          # Secret එකෙන් කෝඩ් එක අරගෙන index.html එක හැදීම
          echo "${{ secrets.MY_INDEX_HTML }}" > raw_index.html
          
          # npx පාවිච්චි කරලා Obfuscate කිරීම (මේක තමයි වැදගත්ම වෙනස)
          npx javascript-obfuscator raw_index.html --output index.html \
            --compact true \
            --self-defending true \
            --string-array true \
            --string-array-encoding 'base64' \
            --domain-lock 'sinhala-wala-katha.github.io'

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
