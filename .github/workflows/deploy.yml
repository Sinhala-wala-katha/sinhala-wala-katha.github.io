name: Safe Obfuscated Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Index and Obfuscate
        env:
          MY_CODE: ${{ secrets.MY_INDEX_HTML }}
        run: |
          # 1. ආරක්ෂිතව Secret එකෙන් කෝඩ් එක ෆයිල් එකකට ගැනීම
          printf "%s" "$MY_CODE" > raw_index.html
          
          # 2. javascript-obfuscator ඉන්ස්ටෝල් කර රන් කිරීම
          npm install javascript-obfuscator
          npx javascript-obfuscator raw_index.html --output index.html \
            --compact true \
            --self-defending true \
            --string-array true \
            --string-array-encoding 'base64' \
            --domain-lock 'sinhala-wala-katha.github.io'
          
          # 3. රෝ ෆයිල් එක මකා දැමීම
          rm raw_index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
