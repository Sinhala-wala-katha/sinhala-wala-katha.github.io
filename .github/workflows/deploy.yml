name: Safe Obfuscated Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and Obfuscate
        env:
          MY_RAW_CODE: ${{ secrets.MY_INDEX_HTML }}
        run: |
          # 1. Secret එකේ තියෙන දේවල් ආරක්ෂිතව ගොනුවකට ගැනීම
          echo "$MY_RAW_CODE" > raw_index.html
          
          # 2. Obfuscator එක install කර පවත්වාගෙන යාම
          npm install javascript-obfuscator
          
          # 3. පටලැවීම සිදු කිරීම (Domain Lock සහ SEO Safe settings සමඟ)
          npx javascript-obfuscator raw_index.html --output index.html \
            --compact true \
            --self-defending true \
            --string-array true \
            --string-array-encoding 'base64' \
            --domain-lock 'sinhala-wala-katha.github.io'

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
