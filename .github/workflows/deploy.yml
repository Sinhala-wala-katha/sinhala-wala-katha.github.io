name: Safe Obfuscated Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Index and Obfuscate
        run: |
          # 1. Secret එකෙන් කෝඩ් එක ගෙන raw_index.html සෑදීම
          echo "${{ secrets.MY_INDEX_HTML }}" > raw_index.html
          
          # 2. npx පාවිච්චි කර javascript-obfuscator එක run කිරීම
          # මෙහිදී package එක install කර ඒ වෙලාවෙම run කරයි
          npx javascript-obfuscator raw_index.html --output index.html \
            --compact true \
            --self-defending true \
            --string-array true \
            --string-array-encoding 'base64' \
            --domain-lock 'sinhala-wala-katha.github.io'
          
          # 3. අනවශ්‍ය raw file එක මකා දැමීම
          rm raw_index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
