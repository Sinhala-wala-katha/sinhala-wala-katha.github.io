name: Safe Obfuscated Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build and Obfuscate
        env:
          MY_RAW_CODE: ${{ secrets.MY_INDEX_HTML }}
        run: |
          echo "$MY_RAW_CODE" > raw_index.html
          npm install javascript-obfuscator html-minifier-terser
          mkdir -p dist
          python3 build_script.py

      - name: Minify Final HTML
        run: |
          npx html-minifier-terser \
            --input-dir dist \
            --output-dir dist \
            --file-ext html \
            --collapse-whitespace \
            --remove-comments \
            --minify-js false \
            --minify-css true \
            || echo "Minify warning (non-fatal)"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
