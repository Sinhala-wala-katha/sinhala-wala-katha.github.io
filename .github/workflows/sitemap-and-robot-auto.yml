name: sitemap-and-robot-auto (static)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. සයිට්මැප් එක සෑදීම
      - name: Generate Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://sinhala-wala-katha.github.io/
          # මෙතනට ෆයිල් එකේ නම හරියටම දුන්නා. දැන් මේක අනිවාර්යයෙන්ම අයින් වෙනවා.
          exclude-files: googlee91a7f05558ef324.html
          include-pdf: false

      # 2. Robots.txt එක සෑදීම
      - name: Create Robots.txt
        run: |
          cat <<EOF > robots.txt
          User-agent: *
          Allow: /
          Disallow: /404.html

          Sitemap: https://sinhala-wala-katha.github.io/sitemap.xml
          EOF

      # 3. ෆයිල් දෙකම එකවර Root එකට Commit කර Push කිරීම
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml robots.txt
          git commit -m "SEO: Updated Sitemap and Robots.txt [skip ci]" || exit 0
          git push
