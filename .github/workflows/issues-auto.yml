name: 🚀 Autonomous SEO Health Monitor 2026

on:
  push:
    branches: ["main"]

  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * 6'

  workflow_dispatch:
    inputs:
      force_new_issue:
        description: 'Force create new issue even if no new content'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  issues: write

env:
  SITE_URL: "https://sinhala-wala-katha.github.io/"
  CACHE_FILE: ".github/link_count_cache.txt"

jobs:
  seo-monitor:
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Detect Site Type
        id: site_type
        run: |
          if [ -f "_config.yml" ] || [ -f "Gemfile" ]; then
            echo "type=jekyll" >> $GITHUB_OUTPUT
            echo "label=Jekyll" >> $GITHUB_OUTPUT
          else
            echo "type=static" >> $GITHUB_OUTPUT
            echo "label=Static HTML" >> $GITHUB_OUTPUT
          fi

      - name: 🧭 Determine Run Mode
        id: run_mode
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "push" ]; then
            echo "mode=push_check" >> $GITHUB_OUTPUT
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            echo "mode=manual" >> $GITHUB_OUTPUT
          elif [ "$EVENT" = "schedule" ]; then
            DAY=$(date +'%u')
            if [ "$DAY" = "6" ]; then
              echo "mode=weekly_full" >> $GITHUB_OUTPUT
            else
              echo "mode=daily_date" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 📊 Extract Live SEO Data
        id: seo_data
        run: |
          URL="${{ env.SITE_URL }}"
          PAGE_CONTENT=$(curl -sL --max-time 30 --retry 3 \
            -A "Mozilla/5.0 (compatible; Googlebot/2.1)" \
            "$URL" || echo "")

          TITLE=$(echo "$PAGE_CONTENT" | grep -oP '(?<=<title>)[^<]*' | head -1 | xargs 2>/dev/null || true)
          DESC=$(echo "$PAGE_CONTENT" | grep -oP '(?<=<meta name="description" content=")[^"]*' | head -1 | xargs 2>/dev/null || true)
          KEYWORDS=$(echo "$PAGE_CONTENT" | grep -oP '(?<=<meta name="keywords" content=")[^"]*' | head -1 | xargs 2>/dev/null || true)
          CANONICAL=$(echo "$PAGE_CONTENT" | grep -oP '(?<=<link rel="canonical" href=")[^"]*' | head -1 | xargs 2>/dev/null || true)

          [ -z "$TITLE" ]     && TITLE="Sinhala Wala Katha"
          [ -z "$DESC" ]      && DESC="Best Sinhala Stories"
          [ -z "$KEYWORDS" ]  && KEYWORDS="sinhala stories"
          [ -z "$CANONICAL" ] && CANONICAL="$URL"

          TITLE=$(echo "$TITLE"       | tr -d '\n\r' | sed 's/[%]//g')
          DESC=$(echo "$DESC"         | tr -d '\n\r' | sed 's/[%]//g')
          KEYWORDS=$(echo "$KEYWORDS" | tr -d '\n\r' | sed 's/[%]//g')

          LINK_COUNT=$(echo "$PAGE_CONTENT" | grep -oc 'href=' || echo "0")

          SITEMAP=$(curl -sL --max-time 15 "${URL}sitemap.xml" || echo "")
          POST_COUNT=$(echo "$SITEMAP" | grep -oc '<loc>' || echo "0")

          CURRENT_DATE=$(date +'%Y-%m-%d')
          WEEK_NUM=$(date +'%V')
          YEAR=$(date +'%Y')
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M UTC')

          echo "link_count=${LINK_COUNT}"  >> $GITHUB_OUTPUT
          echo "post_count=${POST_COUNT}"  >> $GITHUB_OUTPUT
          echo "today=${CURRENT_DATE}"     >> $GITHUB_OUTPUT
          echo "week=${WEEK_NUM}"          >> $GITHUB_OUTPUT
          echo "year=${YEAR}"             >> $GITHUB_OUTPUT
          echo "canonical=${CANONICAL}"   >> $GITHUB_OUTPUT

          {
            echo "site_title<<__EOF__"
            echo "${TITLE}"
            echo "__EOF__"
          } >> $GITHUB_OUTPUT

          {
            echo "site_desc<<__EOF__"
            echo "${DESC}"
            echo "__EOF__"
          } >> $GITHUB_OUTPUT

          {
            echo "site_keywords<<__EOF__"
            echo "${KEYWORDS}"
            echo "__EOF__"
          } >> $GITHUB_OUTPUT

          {
            echo "timestamp<<__EOF__"
            echo "${TIMESTAMP}"
            echo "__EOF__"
          } >> $GITHUB_OUTPUT

          echo "✅ Title='${TITLE}' | Links=${LINK_COUNT} | Posts=${POST_COUNT}"

      - name: 🆕 Detect New Content
        id: new_content
        if: |
          steps.run_mode.outputs.mode == 'push_check' ||
          steps.run_mode.outputs.mode == 'manual'
        run: |
          CURRENT_COUNT="${{ steps.seo_data.outputs.link_count }}"
          CACHE_FILE="${{ env.CACHE_FILE }}"
          FORCE="${{ github.event.inputs.force_new_issue }}"

          mkdir -p .github
          if [ -f "$CACHE_FILE" ]; then
            PREV_COUNT=$(cat "$CACHE_FILE" | tr -d '[:space:]')
          else
            PREV_COUNT=0
          fi

          echo "📈 Previous: ${PREV_COUNT} | Current: ${CURRENT_COUNT}"

          if [ "$CURRENT_COUNT" -gt "$PREV_COUNT" ] 2>/dev/null || [ "$FORCE" = "true" ]; then
            echo "is_new_content=true" >> $GITHUB_OUTPUT
            DIFF=$((CURRENT_COUNT - PREV_COUNT))
            echo "link_diff=${DIFF}" >> $GITHUB_OUTPUT
            echo "✅ New content! +${DIFF} links"
          else
            echo "is_new_content=false" >> $GITHUB_OUTPUT
            echo "link_diff=0" >> $GITHUB_OUTPUT
            echo "ℹ️ No new content."
          fi

          echo "$CURRENT_COUNT" > "$CACHE_FILE"

      - name: 💾 Commit Cache Update
        if: |
          (steps.run_mode.outputs.mode == 'push_check' ||
           steps.run_mode.outputs.mode == 'manual') &&
          steps.new_content.outputs.is_new_content == 'true'
        run: |
          git config user.name "SEO Monitor Bot"
          git config user.email "seo-monitor@github-actions.bot"
          git add "${{ env.CACHE_FILE }}"
          if git diff --staged --quiet; then
            echo "ℹ️ No cache changes."
          else
            git commit -m "🤖 chore: update link cache [${{ steps.seo_data.outputs.link_count }} links] - ${{ steps.seo_data.outputs.today }}"
            git push
          fi

      - name: 🔗 Scan Links with Lychee
        uses: lycheeverse/lychee-action@v1.9.0
        id: lychee
        if: |
          steps.new_content.outputs.is_new_content == 'true' ||
          steps.run_mode.outputs.mode == 'weekly_full' ||
          steps.run_mode.outputs.mode == 'manual'
        continue-on-error: true
        with:
          args: >
            --verbose
            --no-progress
            --accept 200,201,301,302,403,429
            --exclude-mail
            --exclude "^mailto:"
            --exclude "^tel:"
            --exclude "^javascript:"
            --timeout 20
            --retry-wait-time 5
            --max-retries 3
            "${{ env.SITE_URL }}"
          output: ./lychee/out.md
          fail: false

      - name: 🛡️ Ensure Lychee Output Exists
        if: |
          steps.new_content.outputs.is_new_content == 'true' ||
          steps.run_mode.outputs.mode == 'weekly_full' ||
          steps.run_mode.outputs.mode == 'manual'
        run: |
          mkdir -p ./lychee
          if [ ! -f "./lychee/out.md" ]; then
            printf '## ⚠️ Scan Result Unavailable\nLychee scan did not produce output.\n' > ./lychee/out.md
          fi
          if grep -qiE "\[ERROR\]|\[BROKEN\]|✗" ./lychee/out.md 2>/dev/null; then
            echo "has_broken_links=true" >> $GITHUB_ENV
          else
            echo "has_broken_links=false" >> $GITHUB_ENV
          fi

      - name: 📝 Generate Full SEO Report
        if: |
          steps.new_content.outputs.is_new_content == 'true' ||
          steps.run_mode.outputs.mode == 'weekly_full' ||
          steps.run_mode.outputs.mode == 'manual'
        run: |
          SITE_TYPE="${{ steps.site_type.outputs.label }}"
          TODAY="${{ steps.seo_data.outputs.today }}"
          WEEK="${{ steps.seo_data.outputs.week }}"
          YEAR="${{ steps.seo_data.outputs.year }}"
          TIMESTAMP="${{ steps.seo_data.outputs.timestamp }}"
          TITLE="${{ steps.seo_data.outputs.site_title }}"
          DESC="${{ steps.seo_data.outputs.site_desc }}"
          KEYWORDS="${{ steps.seo_data.outputs.site_keywords }}"
          LINKS="${{ steps.seo_data.outputs.link_count }}"
          POSTS="${{ steps.seo_data.outputs.post_count }}"
          CANONICAL="${{ steps.seo_data.outputs.canonical }}"
          MODE="${{ steps.run_mode.outputs.mode }}"
          DIFF="${{ steps.new_content.outputs.link_diff }}"
          DIFF="${DIFF:-0}"

          if [ "$MODE" = "push_check" ]; then
            TRIGGER_BADGE="🆕 New Content Detected (+${DIFF} links)"
          elif [ "$MODE" = "weekly_full" ]; then
            TRIGGER_BADGE="🔄 Weekly Scheduled Update"
          else
            TRIGGER_BADGE="🛠️ Manual Dispatch"
          fi

          {
            printf '# 🌐 [%s](%s)\n' "$TITLE" "$CANONICAL"
            printf '### 🆘 SEO Health Report — Week %s (%s)\n\n' "$WEEK" "$TODAY"
            printf '> **Trigger:** %s\n' "$TRIGGER_BADGE"
            printf '> **Site Type:** %s\n' "$SITE_TYPE"
            printf '> **Last Verified:** %s\n\n' "$TIMESTAMP"
            printf '---\n\n'
            printf '## 📊 Live SEO Metrics\n\n'
            printf '| Metric | Value |\n'
            printf '|--------|-------|\n'
            printf '| 📝 Page Title | %s |\n' "$TITLE"
            printf '| 📄 Meta Description | %s |\n' "$DESC"
            printf '| 🔑 Keywords | %s |\n' "$KEYWORDS"
            printf '| 🔗 Total Live Links | %s |\n' "$LINKS"
            printf '| 📰 Sitemap Pages | %s |\n' "$POSTS"
            printf '| 🏗️ Site Platform | %s |\n' "$SITE_TYPE"
            printf '| 🔗 Canonical URL | [View Site](%s) |\n\n' "$CANONICAL"
            printf '---\n\n'
            printf '## 🛠️ Technical Health Audit\n\n'
            printf '> This report is auto-maintained to keep **[%s](%s)** at maximum Google ranking.\n' "$TITLE" "$CANONICAL"
            printf '> Updated every time new content is added, and refreshed weekly.\n'
            printf '> 🔗 **Visit the site:** [%s](%s)\n\n' "$CANONICAL" "$CANONICAL"
            printf '### 📋 Lychee Link Crawl Report:\n\n'
          } > report.md

          cat ./lychee/out.md >> report.md

          {
            printf '\n---\n\n'
            printf '© %s [%s](%s) | Auto-generated by SEO Monitor | Week %s (%s)\n' \
              "$YEAR" "$TITLE" "$CANONICAL" "$WEEK" "$TODAY"
          } >> report.md

          echo "✅ Report generated — $(wc -l < report.md) lines"

      - name: 🏷️ Ensure GitHub Labels Exist
        if: |
          steps.new_content.outputs.is_new_content == 'true' ||
          steps.run_mode.outputs.mode == 'weekly_full' ||
          steps.run_mode.outputs.mode == 'manual'
        run: |
          for LABEL in "seo-monitor" "automated" "link-health"; do
            gh label create "$LABEL" \
              --color "0075ca" \
              --description "Auto-managed by SEO Monitor" \
              2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔎 Find Existing SEO Issue
        id: find_issue
        if: |
          steps.new_content.outputs.is_new_content == 'true' ||
          steps.run_mode.outputs.mode == 'weekly_full' ||
          steps.run_mode.outputs.mode == 'manual'
        run: |
          ISSUE_NUMBER=$(gh issue list \
            --search "🆘 SEO Health Report in:title" \
            --state open \
            --json number,title \
            --jq '.[0].number // ""' 2>/dev/null || echo "")
          echo "issue-number=${ISSUE_NUMBER}" >> $GITHUB_OUTPUT
          if [ -n "$ISSUE_NUMBER" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "✅ Found existing issue: #${ISSUE_NUMBER}"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No existing issue found."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🆕 Create or Update Issue
        if: |
          steps.new_content.outputs.is_new_content == 'true' ||
          steps.run_mode.outputs.mode == 'weekly_full' ||
          steps.run_mode.outputs.mode == 'manual'
        run: |
          ISSUE_NUMBER="${{ steps.find_issue.outputs.issue-number }}"
          TODAY="${{ steps.seo_data.outputs.today }}"
          WEEK="${{ steps.seo_data.outputs.week }}"
          TITLE="${{ steps.seo_data.outputs.site_title }}"
          ISSUE_TITLE="🆘 SEO Health Report: ${TITLE} - Week ${WEEK} (${TODAY})"
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue edit "$ISSUE_NUMBER" \
              --title "$ISSUE_TITLE" \
              --body-file report.md
            echo "✅ Issue #${ISSUE_NUMBER} updated."
          else
            gh issue create \
              --title "$ISSUE_TITLE" \
              --body-file report.md \
              --label "seo-monitor,automated,link-health"
            echo "✅ New issue created."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📅 Daily Title Date Update
        if: steps.run_mode.outputs.mode == 'daily_date'
        run: |
          TODAY="${{ steps.seo_data.outputs.today }}"
          WEEK="${{ steps.seo_data.outputs.week }}"
          TITLE="${{ steps.seo_data.outputs.site_title }}"
          NEW_TITLE="🆘 SEO Health Report: ${TITLE} - Week ${WEEK} (${TODAY})"
          ISSUE_NUMBER=$(gh issue list \
            --search "🆘 SEO Health Report in:title" \
            --state open \
            --json number \
            --jq '.[0].number // ""' 2>/dev/null || echo "")
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue edit "$ISSUE_NUMBER" --title "$NEW_TITLE"
            echo "✅ Title updated: $NEW_TITLE"
          else
            echo "ℹ️ No open issue found. Skipping."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Workflow Summary
        if: always()
        run: |
          MODE="${{ steps.run_mode.outputs.mode }}"
          TODAY="${{ steps.seo_data.outputs.today }}"
          LINKS="${{ steps.seo_data.outputs.link_count }}"
          IS_NEW="${{ steps.new_content.outputs.is_new_content }}"
          {
            echo "## 🚀 SEO Monitor Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Run Mode | ${MODE} |"
            echo "| Date | ${TODAY} |"
            echo "| Live Links | ${LINKS} |"
            echo "| New Content | ${IS_NEW:-N/A} |"
            echo "| Site Type | ${{ steps.site_type.outputs.label }} |"
          } >> $GITHUB_STEP_SUMMARY
